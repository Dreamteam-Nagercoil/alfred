events { worker_connections 1024; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    server {
        listen 80;
        server_name localhost;

        # 1. Main path routes directly to VS Code Web (code-server)
        location / {
            proxy_pass http://127.0.0.1:4096;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Critical headers for VS Code WebSockets
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # 2. Routes /opencode to OpenCode Agent WebUI
        location /opencode/ {
            proxy_pass http://127.0.0.1:8080/; # Trailing slash ensures paths strip correctly
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # 3. Routes /vikunja to Vikunja Task Management
        location /vikunja/ {
            proxy_pass http://127.0.0.1:3456/; # Trailing slash ensures paths strip correctly
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # 4. Internal Webhook Endpoint
        location /webhook {
            proxy_pass http://127.0.0.1:5000/webhook;
            proxy_set_header Host $host;
        }
    }
}