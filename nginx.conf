events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    proxy_http_version 1.1;
    proxy_buffering off;

    server {
        listen 80;
        server_name localhost;

        # OpenCode app — rewrite asset paths in HTML
        location /opencode/ {
            proxy_pass http://127.0.0.1:8080/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Accept-Encoding "";

            sub_filter_once off;
            sub_filter_types text/html;
            sub_filter 'src="/assets/'   'src="/opencode/assets/';
            sub_filter 'href="/assets/'  'href="/opencode/assets/';
            sub_filter '"/site.webmanifest"' '"/opencode/site.webmanifest"';
        }

        # OpenCode static assets
        location /opencode/assets/ {
            proxy_pass http://127.0.0.1:8080/assets/;
            proxy_set_header Host $host;
        }

        location = /opencode/site.webmanifest {
            proxy_pass http://127.0.0.1:8080/site.webmanifest;
            proxy_set_header Host $host;
        }

        # Vikunja frontend — rewrite asset paths
        location /vikunja/ {
    proxy_pass http://127.0.0.1:3456/;
    proxy_set_header Host $host;
    proxy_set_header Accept-Encoding "";  # MUST disable gzip

    sub_filter_once off;
    sub_filter_types text/html;
    sub_filter 'href="/favicon.ico"'           'href="/vikunja/favicon.ico"';
    sub_filter 'href="/images/'                'href="/vikunja/images/';
    sub_filter 'src="/assets/'                 'src="/vikunja/assets/';
    sub_filter 'href="/assets/'                'href="/vikunja/assets/';
    sub_filter 'href="/manifest.webmanifest"'  'href="/vikunja/manifest.webmanifest"';
}

# Serve Vikunja's static assets at the prefixed paths
location /vikunja/assets/ {
    proxy_pass http://127.0.0.1:3456/assets/;
}

location /vikunja/images/ {
    proxy_pass http://127.0.0.1:3456/images/;
}

location = /vikunja/favicon.ico {
    proxy_pass http://127.0.0.1:3456/favicon.ico;
}

location = /vikunja/manifest.webmanifest {
    proxy_pass http://127.0.0.1:3456/manifest.webmanifest;
}

        # Vikunja API
        location /api/v1/ {
            proxy_pass http://127.0.0.1:3456/api/v1/;
            proxy_set_header Host $host;
        }

        # Webhook
        location /webhook {
            proxy_pass http://127.0.0.1:5000/webhook;
            proxy_set_header Host $host;
        }

        # VS Code (root fallback)
        location / {
            proxy_pass http://127.0.0.1:4096;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 86400;
        }
    }
}